version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: autonomo_postgres
    environment:
      POSTGRES_USER: autonomo_admin
      POSTGRES_PASSWORD: autonomo_password
      POSTGRES_DB: autonomo_pro
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always

  keycloak:
    image: quay.io/keycloak/keycloak:23.0
    container_name: autonomo_keycloak
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/autonomo_pro
      KC_DB_USERNAME: autonomo_admin
      KC_DB_PASSWORD: autonomo_password
    command: start-dev
    ports:
      - "8180:8080"
    depends_on:
      - postgres
    restart: always

volumes:
  pgdata:
